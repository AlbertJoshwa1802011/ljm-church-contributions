<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Beta Access — Light of Jesus Ministry</title>
<!--
  New, standalone entry point for the flag-gated "v2" flow — see
  docs/milestone-v2/11-v2-flow-implementation.md. Nothing on the public site
  links here; it's shared directly with people on the beta_testers allowlist.
  Reuses the exact same Google Identity Services client ID and the same
  defensive "GIS loads async, poll until ready" pattern index.html already
  uses — this is a new page, not new sign-in machinery.
-->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f5f3; color: #1c1f22; padding: 24px;
  }
  .card {
    max-width: 400px; width: 100%; background: #fff; border: 1px solid #e4e2dd; border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,.08); padding: 34px 30px; text-align: center;
  }
  .mark { font-size: 2.2rem; margin-bottom: 6px; }
  h1 { font-size: 1.25rem; margin: 0 0 6px; }
  p { font-size: .88rem; color: #6b6f73; line-height: 1.5; margin: 0 0 22px; }
  #signInBtn { display: flex; justify-content: center; opacity: 0; transition: opacity .2s ease; min-height: 44px; }
  .status { margin-top: 16px; font-size: .82rem; min-height: 1.2em; }
  .status.err { color: #b3261e; }
  .status.ok { color: #1e7a3c; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">🚦</div>
    <h1>Preview the new site</h1>
    <p>Sign in with the Google account you were given beta access with. This only affects your own browser — everyone else keeps seeing the current site.</p>
    <div id="signInBtn"></div>
    <div class="status" id="status"></div>
  </div>

<script>
  function setStatus(msg, cls) {
    var el = document.getElementById('status');
    el.textContent = msg || '';
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  function handleCredentialResponse(response) {
    setStatus('Checking access…');
    fetch('/api/beta-activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ token: response.credential })
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, body: d }; }); })
      .then(function (res) {
        if (res.ok && res.body.success) {
          setStatus('You’re in — redirecting…', 'ok');
          window.location.href = '/';
        } else {
          setStatus(res.body.message || 'This account does not have beta access.', 'err');
        }
      })
      .catch(function () { setStatus('Something went wrong — please try again.', 'err'); });
  }

  var btnContainer = document.getElementById('signInBtn');
  var tries = 0;
  (function waitGis() {
    if (window.google && google.accounts && google.accounts.id) {
      try {
        google.accounts.id.initialize({
          client_id: '915064946962-eohgis92a3jmfk3fi7hkh8uc21971clo.apps.googleusercontent.com',
          callback: handleCredentialResponse,
          use_fedcm_for_prompt: false
        });
        google.accounts.id.renderButton(btnContainer, { theme: 'filled_black', size: 'large', shape: 'pill', text: 'signin_with', width: 260 });
      } catch (e) { console.error('GIS init/render failed:', e); }
      btnContainer.style.opacity = '1';
    } else if (tries++ < 40) {
      setTimeout(waitGis, 250);
    } else {
      btnContainer.innerHTML = '<button onclick="window.location.reload()" style="padding:10px 20px;border-radius:999px;border:1px solid #ccc;background:#fff;cursor:pointer;">Retry sign-in</button>';
      btnContainer.style.opacity = '1';
      setStatus('Google sign-in failed to load.', 'err');
    }
  })();
</script>
</body>
</html>
