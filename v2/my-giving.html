<!doctype html>
<html lang="en">

<title>My Giving — Light of Jesus Ministry</title>

<style>
  .mg-hero { padding: 44px 0 34px; border-bottom: 1px solid var(--border); background: radial-gradient(900px 400px at 12% -20%, var(--accent-soft), transparent 60%), var(--bg); }
  .mg-hero .wrap { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .mg-avatar { width: 62px; height: 62px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-deep); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.3rem; font-family: var(--sans); flex-shrink: 0; }
  .mg-hero h1 { font-size: 1.7rem; }
  .mg-hero p { font-size: .88rem; color: var(--text-soft); margin-top: 4px; }
  .mg-hero .btn { margin-left: auto; }

  .mg-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .mg-stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 24px 26px; }
  .mg-stat-card .lbl { font-size: .74rem; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: var(--text-faint); }
  .mg-stat-card .val { font-family: var(--serif); font-size: 2rem; font-weight: 700; margin-top: 8px; }
  .mg-stat-card .sub { font-size: .78rem; color: var(--text-soft); margin-top: 6px; }
  @media (max-width: 640px) { .mg-stats { grid-template-columns: 1fr; } }

  .mg-history { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
  .mg-history-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .mg-history-head h3 { font-size: 1.05rem; }
  .mg-row { display: flex; align-items: center; gap: 14px; padding: 14px 24px; border-bottom: 1px solid var(--border); }
  .mg-row:last-child { border-bottom: none; }
  .mg-row .fund-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .mg-row .main { flex: 1; min-width: 0; }
  .mg-row .main b { font-size: .88rem; display: block; }
  .mg-row .main span { font-size: .76rem; color: var(--text-faint); }
  .mg-row .amt { font-weight: 700; font-size: .92rem; flex-shrink: 0; }

  .mg-cta-band { background: var(--bg-soft); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 40px 0; text-align: center; }
  .mg-cta-band h2 { font-size: 1.4rem; }
  .mg-cta-band p { font-size: .9rem; color: var(--text-soft); margin: 10px auto 20px; max-width: 46ch; }

  .gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 50px 30px; text-align: center; max-width: 460px; margin: 0 auto; }
  .gate-card .ic { font-size: 2.2rem; }
  .gate-card h2 { font-size: 1.3rem; margin-top: 12px; }
  .gate-card p { color: var(--text-faint); margin-top: 10px; font-size: .9rem; }
  .gate-card .signin-slot-wrap { display: flex; justify-content: center; margin-top: 22px; }

  @media (max-width: 640px) { .mg-hero .btn { margin-left: 0; width: 100%; } }
</style>
</head>

<script>
(function () {
  var btn = document.getElementById('hamburgerBtn');
  var drawer = document.getElementById('navDrawer');
  var backdrop = document.getElementById('navDrawerBackdrop');
  var closeBtn = document.getElementById('navDrawerClose');
  function openDrawer() { drawer.classList.add('open'); backdrop.classList.add('open'); document.body.classList.add('drawer-open'); btn.setAttribute('aria-expanded', 'true'); }
  function closeDrawer() { drawer.classList.remove('open'); backdrop.classList.remove('open'); document.body.classList.remove('drawer-open'); btn.setAttribute('aria-expanded', 'false'); }
  btn.addEventListener('click', openDrawer);
  closeBtn.addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrawer(); });
  Array.prototype.forEach.call(drawer.querySelectorAll('a'), function (a) { a.addEventListener('click', closeDrawer); });
})();
</script>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="auth.js"></script>
<script>
  (function () {
    var root = document.documentElement;
    document.querySelectorAll('.theme-toggle').forEach(function (toggle) {
      toggle.addEventListener('click', function () {
        root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    });
  })();
</script>
<script>
(function () {
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
  function inr(n) { return "₹" + (Number(n) || 0).toLocaleString("en-IN"); }
  function parseDate(s) {
    if (!s) return null;
    var d = new Date(String(s).replace(" ", "T"));
    return isNaN(d) ? null : d;
  }
  function initials(name) {
    return (name || "?").trim().split(/\s+/).map(function (w) { return w.charAt(0); }).join("").substring(0, 2).toUpperCase();
  }

  function renderSignedOut() {
    document.getElementById("pageRoot").innerHTML =
      '<section class="tight"><div class="wrap"><div class="gate-card">' +
      '<div class="ic">🔒</div><h2>Sign in to see your giving</h2>' +
      '<p>Your personal giving history is private to your account. Sign in with the same Google account you used to give.</p>' +
      '<div class="signin-slot-wrap"><div id="gateSigninBtn"></div></div>' +
      '</div></div></section>';
    // Reuse the same GIS init auth.js already ran — just render one more button here.
    if (window.google && google.accounts && google.accounts.id) {
      try {
        google.accounts.id.renderButton(document.getElementById("gateSigninBtn"), { theme: "filled_black", size: "large", shape: "pill", text: "signin_with", width: 260 });
      } catch (_) {}
    }
  }

  function renderUnlinked(profile) {
    document.getElementById("pageRoot").innerHTML =
      '<section class="tight"><div class="wrap"><div class="gate-card">' +
      '<div class="ic">👋</div><h2>Hi ' + esc(profile.name || "") + '!</h2>' +
      '<p>We couldn\'t find a giving record linked to this Google account yet. If you\'ve given before under a different name or email, contact the church office to get it linked — once linked, your history will show up here automatically.</p>' +
      '<div class="signin-slot-wrap"><a href="/give-flow.html" class="btn btn-primary">Make your first gift</a></div>' +
      '</div></div></section>';
  }

  function renderHistory(profile, gifts) {
    var total = gifts.reduce(function (s, g) { return s + (Number(g.Amount) || 0); }, 0);
    var thisYear = new Date().getFullYear();
    var yearGifts = gifts.filter(function (g) { var d = parseDate(g.Date); return d && d.getFullYear() === thisYear; });
    var yearTotal = yearGifts.reduce(function (s, g) { return s + (Number(g.Amount) || 0); }, 0);
    var sorted = gifts.slice().sort(function (a, b) { var da = parseDate(a.Date), db = parseDate(b.Date); return (db ? db.getTime() : 0) - (da ? da.getTime() : 0); });

    var html = '';
    html += '<section class="mg-hero"><div class="wrap"><span class="mg-avatar">' + esc(initials(profile.member)) + '</span>' +
      '<div><h1>Welcome back, ' + esc((profile.member || profile.name || "").split(" ")[0]) + '.</h1><p>' + esc(profile.member) + '</p></div>' +
      '<a href="/give-flow.html" class="btn btn-primary">Give Again</a></div></section>';

    html += '<section class="tight"><div class="wrap"><div class="mg-stats">' +
      '<div class="mg-stat-card"><div class="lbl">All-Time Total</div><div class="val tabular">' + inr(total) + '</div><div class="sub">Across ' + gifts.length + ' gift' + (gifts.length === 1 ? "" : "s") + '</div></div>' +
      '<div class="mg-stat-card"><div class="lbl">This Year</div><div class="val tabular">' + inr(yearTotal) + '</div><div class="sub">' + yearGifts.length + ' gift' + (yearGifts.length === 1 ? "" : "s") + ' in ' + thisYear + '</div></div>' +
      '</div></div></section>';

    html += '<section class="tight" style="padding-top:0"><div class="wrap"><div class="mg-history">' +
      '<div class="mg-history-head"><h3>Your Giving History</h3><span style="font-size:.78rem;color:var(--text-faint)">' + gifts.length + ' gift' + (gifts.length === 1 ? "" : "s") + '</span></div>' +
      (sorted.length ? sorted.map(function (g) {
        var d = parseDate(g.Date);
        var dateStr = d ? d.toLocaleDateString("en-US", { day: "numeric", month: "short", year: "numeric" }) : "Unknown date";
        return '<div class="mg-row"><span class="fund-dot"></span><div class="main"><b>' + inr(g.Amount) + '</b><span>' + esc(g.fundLabel) + ' · ' + esc(/verified|online/i.test(g.Category || "") ? "Online" : (g.Category || "Manual")) + ' · ' + dateStr + '</span></div></div>';
      }).join("") : '<div class="mg-row"><span style="color:var(--text-faint)">No gifts recorded yet.</span></div>') +
      '</div></div></section>';

    html += '<section class="mg-cta-band"><div class="wrap"><h2>Keep the light shining.</h2><p>Every gift — big or small — helps both churches serve Coimbatore and beyond.</p><a href="/give-flow.html" class="btn btn-primary">Give Now</a></div></section>';

    document.getElementById("pageRoot").innerHTML = html;
  }

  function loadHistory(profile) {
    document.getElementById("pageRoot").innerHTML = '<section class="tight"><div class="wrap"><p style="color:var(--text-faint)">Loading your giving history…</p></div></section>';
    Promise.all([
      fetch("/api/contributions?fund=tech-contributions&_t=" + Date.now(), { cache: "no-store" }).then(function (r) { return r.json(); }),
      fetch("/api/contributions?fund=christmas-fund&_t=" + Date.now(), { cache: "no-store" }).then(function (r) { return r.json(); })
    ]).then(function (results) {
      var gifts = [];
      var labels = ["Tech Fund", "Christmas Fund"];
      results.forEach(function (data, i) {
        ((data && data.contributions) || []).forEach(function (c) {
          if (c.Member === profile.member) gifts.push(Object.assign({}, c, { fundLabel: labels[i] }));
        });
      });
      renderHistory(profile, gifts);
    }).catch(function () {
      document.getElementById("pageRoot").innerHTML = '<section class="tight"><div class="wrap"><p style="color:var(--text-faint)">Could not load your giving history right now — please try again shortly.</p></div></section>';
    });
  }

  window.addEventListener("ljm-auth-ready", function (e) {
    var profile = e.detail;
    if (!profile) { renderSignedOut(); return; }
    if (!profile.member) { renderUnlinked(profile); return; }
    loadHistory(profile);
  });
})();
</script>
</body>
</html>
