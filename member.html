<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>My Contributions · LJM Church</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="theme.css">
<script src="theme.js"></script>
<script src="header.js"></script>
<script src="appearance.js"></script>
<script src="member-dashboard.js" defer></script>
</head>

<body>

<header class="navbar">
    <div class="logo">LJM Church Contributions</div>
    <nav>
        <a href="funds.html">Funds</a>
        <a href="members.html">Members</a>
        <a href="about.html">About</a>
    </nav>
</header>

<main class="container">

    <!-- Member Heading -->
    <section class="fund-heading">
        <h2 id="memberHeading">🙏 My Contributions</h2>
        <p class="soft-subtext" id="memberSubText">
            Thank you for your faithful giving
        </p>
    </section>

    <!-- Verse Cards (pastor-curated Verse of the Month / Year) -->
    <section class="verse-cards" id="verseCards" style="display:none;">
        <article class="verse-card-lg" id="verseMonthCard">
            <div class="vc-top">
                <span class="vc-badge">✝ Verse of the Month</span>
                <span class="vc-label" id="verseMonthLabel"></span>
            </div>
            <blockquote class="vc-text" id="verseMonthText"></blockquote>
            <cite class="vc-ref" id="verseMonthRef"></cite>
        </article>
        <article class="verse-card-lg vc-year" id="verseYearCard">
            <div class="vc-top">
                <span class="vc-badge">🌟 Verse of the Year</span>
                <span class="vc-label" id="verseYearLabel"></span>
            </div>
            <blockquote class="vc-text" id="verseYearText"></blockquote>
            <cite class="vc-ref" id="verseYearRef"></cite>
        </article>
    </section>

    <!-- Member Summary -->
    <section class="summary">
        <div class="stat-card">
            <h3>Total Given</h3>
            <div class="stat-value" id="totalGiven">₹0</div>
        </div>
        <div class="stat-card">
            <h3>Contributions</h3>
            <div class="stat-value" id="totalEntries">0</div>
        </div>
        <div class="stat-card">
            <h3>Funds Supported</h3>
            <div class="stat-value" id="fundCount">0</div>
        </div>
    </section>

    <!-- Fund-wise Summary -->
    <section class="charts">
        <div class="chart-card">
            <h3 class="section-title">Fund-wise Contribution</h3>
            <div id="fundSummary"></div>
        </div>
    </section>

    <!-- Timeline -->


</main>


<footer class="premium-footer">
    <div class="footer-bottom">
        © 2026 · LJM Church · Light of Jesus Ministry · Built with ❤️
    </div>
</footer>

<script>
(function () {
    // Same verse-of-the-month/year card shown on the public dashboard —
    // repeated here so a signed-in believer sees it on their own page too.
    fetch("/api/settings?_t=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            var s = (data && data.settings) || {};
            var section = document.getElementById("verseCards");

            function fill(cardId, labelId, textId, refId, label, text, ref) {
                var card = document.getElementById(cardId);
                var hasText = text && text.trim();
                if (!hasText) { card.style.display = "none"; return false; }
                card.style.display = "";
                document.getElementById(labelId).textContent = label || "";
                document.getElementById(textId).textContent = '"' + text.trim() + '"';
                var refEl = document.getElementById(refId);
                refEl.textContent = ref && ref.trim() ? "— " + ref.trim() : "";
                return true;
            }

            var monthShown = fill("verseMonthCard", "verseMonthLabel", "verseMonthText", "verseMonthRef",
                s.verse_month_label, s.verse_month_text, s.verse_month_ref);
            var yearShown = fill("verseYearCard", "verseYearLabel", "verseYearText", "verseYearRef",
                s.verse_year_label, s.verse_year_text, s.verse_year_ref);

            section.style.display = (monthShown || yearShown) ? "" : "none";
        })
        .catch(function () { document.getElementById("verseCards").style.display = "none"; });
})();
</script>
</body>
</html>
