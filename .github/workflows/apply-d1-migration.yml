name: Apply D1 Migration

on:
  workflow_dispatch:
    inputs:
      file:
        description: "Path to a migration .sql file to apply (relative to repo root), e.g. migrations/0005_purchase_attribution.sql"
        required: false
        type: string
      sql:
        description: "Raw SQL to run instead of a file (e.g. a PRAGMA/SELECT for verification)"
        required: false
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run against remote D1 (ljm-contributions-db)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MIGRATION_FILE: ${{ inputs.file }}
          MIGRATION_SQL: ${{ inputs.sql }}
        run: |
          if [ -n "$MIGRATION_FILE" ]; then
            echo "Applying file: $MIGRATION_FILE"
            npx wrangler d1 execute ljm-contributions-db --remote --file="$MIGRATION_FILE"
          elif [ -n "$MIGRATION_SQL" ]; then
            echo "Running SQL: $MIGRATION_SQL"
            npx wrangler d1 execute ljm-contributions-db --remote --command="$MIGRATION_SQL"
          else
            echo "Provide either the 'file' or 'sql' input." >&2
            exit 1
          fi
